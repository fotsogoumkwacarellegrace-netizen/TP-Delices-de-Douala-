<div class="card  restaurant-card shadow-sm border-0 rounded-3 overflow-hidden mx-auto " (click)="onRestaurantClick()">
  <div card content d-flex flex-column h-100>
    <!-- Image du restaurant -->
    <div class="restaurant-image-container position-relative">
      <img
        [src]="restaurant().image"
        [alt]="restaurant().name"
        class="card-img-top restaurant-image"
        style="height: 200px; object-fit: cover;">
    </div>

    <div class="card-body d-flex flex-column">
      <!-- Nom du restaurant -->
      <h5 class="card-title fw-bold mb-2">{{ restaurant().name }}</h5>

      <!-- Localisation -->
      <p class="card-text mb-2 d-flex align-items-start gap-2">
        <span style="font-size: 18px;">📍</span>
        <span class="text-muted">{{ restaurant().district }}</span>
      </p>

      <!-- Spécialité / Cuisine -->
      <p class="card-text1 mb-3 d-flex align-items-start gap-2">
        <span style="font-size: 18px;">🍽️</span>
        <span class="text-muted">{{ restaurant().specialty }}</span>
      </p>

      <!-- Star Rating Component -->
      <div class="mb-3" (click)="$event.stopPropagation()">
        <app-star-rating
          [CurrentRating]="restaurant().currentRating"
          (RatingChanged)="onRatingChanged($event)">
        </app-star-rating>
      </div>

      <!-- Affichage du score ou bouton "Cliquez!" -->
      @if (restaurant().currentRating > 0) {
        <button class="btn btn-light btn-sm fw-bold rounded-2 mt-auto" disabled>
          ({{ restaurant().currentRating }}/5)
        </button>
      } @else {
        <button class="btn btn-warning btn-sm fw-bold rounded-2 mt-auto" disabled>
          Cliquez !
        </button>
      }
    </div>
  </div>
</div>
