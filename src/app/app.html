<app-header 
[RatedCount]="RatedCount()"
[averageRating]="averageRating()"></app-header>

<div class="container text-center my-3">
  <button class="btn btn-outline-success" (click)="toggleFilter()">
    @if (showTopRated()) { 
      afficher tous les restaurants
    }@else {
      afficher uniquement >= 4 étoiles
    }
  </button>
</div>

<main class="container py-4">
  <app-restaurant-list 
  [restaurants]="filteredRestaurants()"
  (RestaurantRated)="onRestaurantRated($event)">
  </app-restaurant-list>
</main>
<app-footer></app-footer>
