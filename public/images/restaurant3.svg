<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background garden -->
  <rect width="400" height="300" fill="#90ee90"/>
  <!-- Building -->
  <rect x="50" y="100" width="300" height="150" fill="#1a1a1a"/>
  <!-- Neon sign -->
  <rect x="100" y="40" width="200" height="50" fill="none" stroke="#ffff00" stroke-width="3" rx="5"/>
  <text x="200" y="75" font-size="18" fill="#ffff00" text-anchor="middle" font-weight="bold">CHEZ KAMGANG</text>
  <!-- Door -->
  <rect x="170" y="180" width="60" height="70" fill="#444"/>
  <!-- Windows -->
  <circle cx="90" cy="140" r="25" fill="#87ceeb"/>
  <circle cx="200" cy="140" r="25" fill="#87ceeb"/>
  <circle cx="310" cy="140" r="25" fill="#87ceeb"/>
  <!-- Lights -->
  <circle cx="90" cy="140" r="6" fill="#ffaa00"/>
  <circle cx="200" cy="140" r="6" fill="#ffaa00"/>
  <circle cx="310" cy="140" r="6" fill="#ffaa00"/>
  <!-- Roof -->
  <polygon points="50,100 200,30 350,100" fill="#333"/>
</svg>