<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#d4a574"/>
  <!-- Building -->
  <rect x="50" y="100" width="300" height="150" fill="#8b4513"/>
  <!-- Door -->
  <rect x="175" y="180" width="50" height="70" fill="#654321"/>
  <!-- Windows -->
  <rect x="80" y="120" width="40" height="40" fill="#ffd700"/>
  <rect x="130" y="120" width="40" height="40" fill="#ffd700"/>
  <rect x="180" y="120" width="40" height="40" fill="#ffd700"/>
  <rect x="230" y="120" width="40" height="40" fill="#ffd700"/>
  <rect x="280" y="120" width="40" height="40" fill="#ffd700"/>
  <!-- Lights inside windows -->
  <circle cx="100" cy="140" r="8" fill="#ffaa00"/>
  <circle cx="150" cy="140" r="8" fill="#ffaa00"/>
  <circle cx="200" cy="140" r="8" fill="#ffaa00"/>
  <circle cx="250" cy="140" r="8" fill="#ffaa00"/>
  <circle cx="300" cy="140" r="8" fill="#ffaa00"/>
  <!-- Roof -->
  <polygon points="50,100 200,20 350,100" fill="#5d3a1a"/>
  <!-- Sign -->
  <rect x="120" y="30" width="160" height="40" fill="#ffd700" rx="5"/>
  <text x="200" y="60" font-size="24" fill="#8b4513" text-anchor="middle" font-weight="bold">Restaurant</text>
</svg>