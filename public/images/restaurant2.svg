<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background night sky -->
  <rect width="400" height="300" fill="#1a3a52"/>
  <!-- Building modern -->
  <rect x="40" y="80" width="320" height="170" fill="#2c3e50"/>
  <!-- Large glass window -->
  <rect x="60" y="100" width="280" height="120" fill="#87ceeb" opacity="0.8"/>
  <!-- Window grid -->
  <line x1="140" y1="100" x2="140" y2="220" stroke="#34495e" stroke-width="2"/>
  <line x1="220" y1="100" x2="220" y2="220" stroke="#34495e" stroke-width="2"/>
  <line x1="60" y1="160" x2="340" y2="160" stroke="#34495e" stroke-width="2"/>
  <!-- Entrance -->
  <rect x="175" y="200" width="50" height="50" fill="#16213e"/>
  <!-- Lights -->
  <circle cx="100" cy="130" r="6" fill="#ffaa00"/>
  <circle cx="100" cy="190" r="6" fill="#ffaa00"/>
  <circle cx="200" cy="130" r="6" fill="#ffaa00"/>
  <circle cx="200" cy="190" r="6" fill="#ffaa00"/>
  <circle cx="300" cy="130" r="6" fill="#ffaa00"/>
  <circle cx="300" cy="190" r="6" fill="#ffaa00"/>
  <!-- Roof -->
  <polygon points="40,80 200,30 360,80" fill="#1a1a2e"/>
  <!-- Sign -->
  <text x="200" y="50" font-size="20" fill="#ffd700" text-anchor="middle" font-weight="bold">Akwa Palace</text>
</svg>