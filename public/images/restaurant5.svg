<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a1a"/>
  <!-- Building -->
  <rect x="50" y="80" width="300" height="170" fill="#2d2d2d"/>
  <!-- Neon sign -->
  <text x="200" y="50" font-size="24" fill="#ff1493" text-anchor="middle" font-weight="bold" font-style="italic">Lounge 237</text>
  <!-- Windows with lights -->
  <rect x="70" y="100" width="60" height="60" fill="#4b0082" stroke="#ff1493" stroke-width="2"/>
  <rect x="170" y="100" width="60" height="60" fill="#4b0082" stroke="#ff1493" stroke-width="2"/>
  <rect x="270" y="100" width="60" height="60" fill="#4b0082" stroke="#ff1493" stroke-width="2"/>
  <!-- Door -->
  <rect x="175" y="200" width="50" height="50" fill="#111"/>
  <!-- Lights inside -->
  <circle cx="100" cy="130" r="8" fill="#ffaa00"/>
  <circle cx="200" cy="130" r="8" fill="#ffaa00"/>
  <circle cx="300" cy="130" r="8" fill="#ffaa00"/>
  <!-- Decorative circles -->
  <circle cx="30" cy="150" r="15" fill="none" stroke="#ff1493" stroke-width="2"/>
  <circle cx="370" cy="150" r="15" fill="none" stroke="#ff1493" stroke-width="2"/>
</svg>